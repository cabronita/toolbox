---

- name: Set host groups
  gather_subset:
    - '!all'
    - '!min'
    - 'hardware'
    - 'os_family'
    - 'virtualization_type'
  hosts: all
  tags: always
  tasks:
  - name: Set virtualization type
    ansible.builtin.group_by:
      key: virt_{{ ansible_virtualization_type }}_{{ ansible_virtualization_role }}
    changed_when: false
  - name: Print host's groups
    ansible.builtin.debug:
      msg: "group_names: {{ group_names }}"

- name: Apply common configuration to all machines
  gather_facts: false
  hosts: all
  roles:
    - {role: common, tags: common}
    - {role: docker, tags: docker}
    - {role: data_fs, tags: data_fs}
    - {role: node-exporter, tags: node-exporter}
    - {role: webserver, tags: webserver}

- name: Set up davfs2 client
  gather_facts: false
  hosts: all
  roles:
    - {role: davfs2, tags: davfs2}

- name: Set up grafana server
  gather_facts: false
  hosts: grafana
  roles:
    - {role: grafana, tags: grafana}

- name: Set up influx server
  gather_facts: false
  hosts: influx
  roles:
    - {role: influx, tags: influx}

- name: Set up jenkins server
  gather_facts: false
  hosts: jenkins
  roles:
    - {role: jenkins, tags: jenkins}

- name: Set up desktop servers
  gather_facts: false
  hosts: desktop
  roles:
    - {role: desktop, tags: desktop}

- name: Set up mongo servers
  gather_facts: false
  hosts: mongo
  roles:
    - {role: mongo, tags: mongo}

- name: Set up prometheus servers
  gather_facts: false
  hosts: prometheus
  roles:
    - {role: prometheus, tags: prometheus}

- name: Set up rsvp monitors
  gather_facts: false
  hosts: rsvp
  roles:
    - {role: rsvp, tags: rsvp}

- name: Set up samba server
  gather_facts: false
  hosts: samba
  roles:
    - {role: samba, tags: samba}

- name: Set up simrail buffer
  gather_facts: false
  hosts: simrail
  roles:
    - {role: simrail, tags: simrail}

- name: Set up temper
  gather_facts: false
  hosts: temper
  roles:
    - {role: temper, tags: temper}

- name: Set up virt_kvm_host
  gather_facts: false
  hosts: kvm_host
  roles:
    - {role: kvm_host, tags: kvm_host}
